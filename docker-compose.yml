# version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: reachinbox_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: reachinbox
      POSTGRES_PASSWORD: reachinbox_pass
      POSTGRES_DB: reachinbox_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reachinbox -d reachinbox_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: reachinbox_redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: reachinbox_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - ./apps/backend/.env
    environment:
      - DATABASE_URL=postgresql://reachinbox:reachinbox_pass@postgres:5432/reachinbox_db?schema=public
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: reachinbox_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://backend:5000
      NEXT_PUBLIC_WS_URL: ws://backend:5000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
  redis_data:
